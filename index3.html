</div>  <script>
/* ================= 1. SEARCH LOGIC ================= */
const searchInput = document.getElementById('search');
const movieGrid = document.getElementById('movieGrid');

if (searchInput) {
    searchInput.addEventListener('keyup', () => {
        const filter = searchInput.value.toLowerCase();
        movieGrid.querySelectorAll('.movie-card').forEach(card => {
            const title = card.querySelector('h3').textContent.toLowerCase();
            card.style.display = title.includes(filter) ? '' : 'none';
        });
    });
}

/* ================= 2. MOVIE PLAY LOGIC (SessionStorage) ================= */
function playMovie(element) {
    // Data attributes se links aur title uthao
    const v = element.getAttribute('data-v');
    const a = element.getAttribute('data-a');
    const t = element.getAttribute('data-t');

    // Browser memory mein save karo (Taaki URL saaf rahe)
    sessionStorage.setItem('videoLink', v);
    sessionStorage.setItem('audioLink', a);
    sessionStorage.setItem('movieTitle', t);

    // Player page par bhej do
    window.location.href = 'player.html';
}

/* ================= 3. SECURITY (No Right Click / No F12) ================= */
// Poori site par Right Click aur Long Press Block
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
}, false);

// Text selection block (Aesthetic feel)
document.addEventListener('selectstart', function(e) {
    e.preventDefault();
}, false);

// Keyboard Shortcuts Block (F12, Ctrl+U, etc.)
document.onkeydown = function(e) {
    if(e.keyCode == 123 || 
       (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || 
       (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
        return false;
    }
};

/* ================= 4. MOBILE LONG PRESS FIX ================= */
// Buttons par special layer taaki mobile menu na khule
document.querySelectorAll('.stream-now').forEach(btn => {
    btn.oncontextmenu = function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    };
});
</script>
