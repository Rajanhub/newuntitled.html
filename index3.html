</div>  <script>
/* ================= SEARCH ================= */
const searchInput = document.getElementById('search');
const movieGrid = document.getElementById('movieGrid');

searchInput.addEventListener('keyup', () => {
    const filter = searchInput.value.toLowerCase();
    movieGrid.querySelectorAll('.movie-card').forEach(card => {
        const title = card.querySelector('h3').textContent.toLowerCase();
        card.style.display = title.includes(filter) ? '' : 'none';
    });
});
// Poori website par Right Click / Long Press Block
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
}, false);

// Text selection bhi block kar do (Aesthetic feel ke liye)
document.addEventListener('selectstart', function(e) {
    e.preventDefault();
}, false);

 document.onkeydown = function(e) {
    if(e.keyCode == 123) { // F12 Block
        return false;
    }
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I Block
        return false;
    }
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C Block
        return false;
    }
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J Block
        return false;
    }
    if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U (View Source) Block
        return false;
    }
};
