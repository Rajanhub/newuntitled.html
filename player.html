<!DOCTYPE html>
<html>
<head>
    <title>RJN Smart Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        video { width: 100%; border-radius: 10px; border: 1px solid #444; background: #111; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .btn-sync { background: #e50914; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-sync:hover { background: #ff0a16; transform: scale(1.05); }
        #display-title { margin-bottom: 15px; color: #007bff; text-shadow: 0 0 10px rgba(0,123,255,0.3); }
    </style>
</head>
<body>

<div class="container">
    <h2 id="display-title">RJN Player</h2>
    <video id="video" controls muted playsinline></video>
    <audio id="audio"></audio>
    <br>
    <button class="btn-sync" onclick="startEverything()">🚀 Unmute & Play Sync</button>
</div>

<script>
    // 1. Storage se data uthao (Brave/Soul fix ke liye localStorage zyada behtar hai)
    const videoSrc = localStorage.getItem('videoLink') || sessionStorage.getItem('videoLink');
    const audioSrc = localStorage.getItem('audioLink') || sessionStorage.getItem('audioLink');
    const movieTitle = localStorage.getItem('movieTitle') || sessionStorage.getItem('movieTitle');

    const video = document.getElementById('video');
    const audio = document.getElementById('audio');
    const titleHeader = document.getElementById('display-title');

    if(movieTitle && titleHeader) {
        titleHeader.innerText = "Watching: " + movieTitle;
    }

    // 2. Simple & Fast HLS Loader (Tere purane code wala logic)
    function loadSource(el, src) {
        if (Hls.isSupported() && src) {
            const hls = new Hls({ 
                enableWorker: false, // Worker off karne se sync speed badhti hai
                manifestLoadingMaxRetry: 10
            });
            hls.loadSource(src);
            hls.attachMedia(el);
        } else if (el.canPlayType('application/vnd.apple.mpegurl')) {
            el.src = src;
        }
    }

    if (videoSrc && audioSrc) {
        loadSource(video, videoSrc);
        loadSource(audio, audioSrc);
    } else {
        alert("Bhai, pehle Movie select karo!");
        window.location.href = 'index3.html'; 
    }

    // 3. ASLI SYNC LOGIC (Har 1 second mein check karega)
    function startEverything() {
        video.muted = false; 
        video.play();
        audio.play();
        // Force Sync on start
        audio.currentTime = video.currentTime; 
    }

    // Video play/pause hone par audio ko force sync karo
    video.onplay = () => {
        audio.currentTime = video.currentTime;
        audio.play();
    };
    video.onpause = () => audio.pause();
    
    // Seeking (Forward/Backward) par 0.1s ka delay taaki audio load ho jaye
    video.onseeking = () => {
        audio.pause();
        setTimeout(() => {
            audio.currentTime = video.currentTime;
            if (!video.paused) audio.play();
        }, 100); 
    };

    // Auto-Sync if gap > 0.5 seconds
    setInterval(() => {
        if (!video.paused && Math.abs(video.currentTime - audio.currentTime) > 0.5) {
            audio.currentTime = video.currentTime;
        }
    }, 1000);

    video.onvolumechange = () => { 
        audio.volume = video.volume; 
        audio.muted = video.muted; 
    };
</script>
</body>
</html>
