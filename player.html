<!DOCTYPE html>
<html>
<head>
    <title>RJN Smart Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        video { width: 100%; border-radius: 10px; border: 1px solid #444; }
        .btn-sync { background: #e50914; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">RJN Player</h2>
    <video id="video" controls muted></video>
    <audio id="audio"></audio>
    <br>
    <button class="btn-sync" onclick="startEverything()">Unmute & Play Sync</button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    // Link ko decode karna zaruri hai taaki & aur ? symbols na tutein
    const vSrc = decodeURIComponent(params.get('v'));
    const aSrc = decodeURIComponent(params.get('a'));

    const video = document.getElementById('video');
    const audio = document.getElementById('audio');

    function loadHls(el, src) {
        if (Hls.isSupported()) {
            const hls = new Hls({ enableWorker: true });
            hls.loadSource(src);
            hls.attachMedia(el);
        }
    }

    // Load initial sources
    if (vSrc && aSrc) {
        loadHls(video, vSrc);
        loadHls(audio, aSrc);
    }

    // --- YE HAI ASLI FIX ---
    function startEverything() {
        video.muted = false; // Mute hatao
        video.play();
        audio.play();
        audio.currentTime = video.currentTime; // Sync karo
    }

    // Sync Logic
    video.onplay = () => audio.play();
    video.onpause = () => audio.pause();
    video.onseeking = () => { audio.currentTime = video.currentTime; };
</script>
</body>
</html>
