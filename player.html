<!DOCTYPE html>
<html>
<head>
    <title>RJN Smart Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        video { width: 100%; border-radius: 10px; border: 1px solid #444; }
        .btn-sync { background: #e50914; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">RJN Player</h2>
    <video id="video" controls muted></video>
    <audio id="audio"></audio>
    <br>
    <button class="btn-sync" onclick="startEverything()">Unmute & Play Sync</button>
</div>

<script>
    // 1. URL params ki ab zaroorat nahi, seedha memory se data uthao
    const videoSrc = sessionStorage.getItem('videoLink');
    const audioSrc = sessionStorage.getItem('audioLink');
    const movieTitle = sessionStorage.getItem('movieTitle');

    const video = document.getElementById('video');
    const audio = document.getElementById('audio');
    const titleHeader = document.getElementById('display-title'); // Agar HTML mein title h2 hai toh

    // Title dikhane ke liye
    if(movieTitle && titleHeader) {
        titleHeader.innerText = "Watching: " + movieTitle;
    }

    // 2. HLS Load Function
    function loadHls(el, src) {
        if (Hls.isSupported() && src) {
            const hls = new Hls({ 
                enableWorker: true,
                lowLatencyMode: true 
            });
            hls.loadSource(src);
            hls.attachMedia(el);
        }
    }

    // 3. Load Karo agar memory mein link mil gaya
    if (videoSrc && audioSrc) {
        loadHls(video, videoSrc);
        loadHls(audio, audioSrc);
    } else {
        // Agar memory khali hai toh wapas bhej do
        alert("Bhai, pehle Movie select karo!");
        window.location.href = 'index.html';
    }

    // 4. --- START & SYNC LOGIC ---
    function startEverything() {
        video.muted = false; 
        video.play();
        audio.play();
        audio.currentTime = video.currentTime; 
    }

    // Sync Events
    video.onplay = () => audio.play();
    video.onpause = () => audio.pause();
    video.onseeking = () => { audio.currentTime = video.currentTime; };
    video.onvolumechange = () => { 
        audio.volume = video.volume; 
        audio.muted = video.muted; 
    };
</script>

</body>
</html>
